# 패키징 설정 (6.3.1) — npm run dist:mac / dist:win
appId: ai.vessl.gqcut
productName: GQCut
directories:
  output: release
files:
  - out/**
  - package.json
# 번들 전환 효과음(phase-9) — asar 밖 Resources/sfx 로 복사, 런타임에 media:// 로 로드
extraResources:
  - from: resources/sfx
    to: sfx
    filter:
      - '**/*'
# 네이티브 바이너리/모델 런타임은 asar 밖으로 (실행/로드 가능해야 함)
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
  # STT(3.2): onnxruntime-node 네이티브 애드온 + Whisper WASM/토크나이저 자산
  - node_modules/onnxruntime-node/**
  - node_modules/@huggingface/**
  # AI 어시스턴트(phase-7): Agent SDK 는 런타임에 번들 CLI 를 디스크로 추출하므로 asar 밖에 둬야 한다
  - node_modules/@anthropic-ai/claude-agent-sdk/**

mac:
  category: public.app-category.video
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 공증 (6.3.2): 환경변수 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 필요
  notarize: true

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# 자동 업데이트 게시 채널 (6.3.3) — GitHub Releases
publish:
  provider: github
  owner: yongkyu4803
  repo: gqcut
