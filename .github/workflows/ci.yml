# CI 게이트 (0.1.6): 계획 검증 + 타입체크 + 유닛테스트 + 빌드 + e2e 스모크 (1.6.2)
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 러너(Node 24)에서 electron 의 extract-zip 이 압축해제를 끝내지 못한 채 조용히 종료해
      # 불완전한 dist 가 남는다 → 설치 스크립트를 우회하고 zip 을 ditto 로 직접 해제 (macOS 러너 전용)
      - name: Electron 바이너리 보장
        run: |
          VER=$(node -p "require('./node_modules/electron/package.json').version")
          ARCH=$([ "$(uname -m)" = "arm64" ] && echo arm64 || echo x64)
          ZIP=$(find "$HOME/Library/Caches/electron" -name "electron-v${VER}-darwin-${ARCH}.zip" 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            ZIP=/tmp/electron.zip
            curl -fsSL -o "$ZIP" "https://github.com/electron/electron/releases/download/v${VER}/electron-v${VER}-darwin-${ARCH}.zip"
          fi
          echo "using $ZIP"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          mkdir -p node_modules/electron/dist
          ditto -xk "$ZIP" node_modules/electron/dist
          printf "Electron.app/Contents/MacOS/Electron" > node_modules/electron/path.txt
          npx electron --version
      - run: npm run plan:validate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # e2e 스모크 (1.6.3): 실패 시 phase 진행 불가
      - run: npm run e2e
