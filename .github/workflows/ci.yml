# CI 게이트 (0.1.6): 계획 검증 + 타입체크 + 유닛테스트 + 빌드 + e2e 스모크 (1.6.2)
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # npm ci 의 electron postinstall 이 dist 만 만들고 path.txt 를 못 쓰는 반쯤 깨진 상태가 되면
      # install.js 가 설치됐다고 오판한다 → 지우고 강제 재설치 후 실행 검증
      - name: Electron 바이너리 보장
        run: |
          if ! npx electron --version 2>/dev/null; then
            rm -rf node_modules/electron/dist node_modules/electron/path.txt
            node node_modules/electron/install.js
            npx electron --version
          fi
      - run: npm run plan:validate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # e2e 스모크 (1.6.3): 실패 시 phase 진행 불가
      - run: npm run e2e
