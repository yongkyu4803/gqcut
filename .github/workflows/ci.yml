# CI 게이트 (0.1.6): 계획 검증 + 타입체크 + 유닛테스트 + 빌드 + e2e 스모크 (1.6.2)
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 러너의 Node 24 에서 electron install.js 가 dist 압축해제까지만 하고 path.txt 를 쓰기 전에
      # 조용히 종료하는 버그(extract-zip 프로미스 미해결) → path.txt 를 직접 보정 후 실행 검증
      - name: Electron 바이너리 보장
        run: |
          node node_modules/electron/install.js
          node -e "const fs=require('fs'),p='node_modules/electron/path.txt';if(!fs.existsSync(p))fs.writeFileSync(p,'Electron.app/Contents/MacOS/Electron')"
          npx electron --version
      - run: npm run plan:validate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # e2e 스모크 (1.6.3): 실패 시 phase 진행 불가
      - run: npm run e2e
