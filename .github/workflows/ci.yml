# CI 게이트 (0.1.6): 계획 검증 + 타입체크 + 유닛테스트 + 빌드 + e2e 스모크 (1.6.2)
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # npm ci 의 electron postinstall 이 CI 에서 바이너리를 남기지 않는 문제 → 강제 재설치 (+DEBUG 진단)
      - name: Electron 바이너리 보장
        run: |
          echo "SKIP_BINARY=[$ELECTRON_SKIP_BINARY_DOWNLOAD]"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          DEBUG='@electron/get:*' node node_modules/electron/install.js
          echo "install.js exit: $?"
          ls node_modules/electron/dist/ 2>/dev/null | head -3 || echo "(dist 없음)"
          npx electron --version
      - run: npm run plan:validate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # e2e 스모크 (1.6.3): 실패 시 phase 진행 불가
      - run: npm run e2e
